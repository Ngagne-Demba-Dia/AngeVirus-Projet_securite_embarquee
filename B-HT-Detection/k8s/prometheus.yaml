---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: ht-detection
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: 'ht-api'
        metrics_path: '/metrics'
        static_configs:
          - targets: ['ht-api-service.ht-detection.svc.cluster.local:80']
        relabel_configs:
          - source_labels: [__address__]
            target_label: instance
            replacement: 'ht-api'
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: ht-detection
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      containers:
        - name: prometheus
          image: prom/prometheus:v2.51.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.retention.time=7d"
          ports:
            - containerPort: 9090
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      volumes:
        - name: config
          configMap:
            name: prometheus-config
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus-service
  namespace: ht-detection
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - name: http
      port: 9090
      targetPort: 9090
      nodePort: 30900
  type: NodePort
